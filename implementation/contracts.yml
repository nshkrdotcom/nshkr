  vocabulary:
    - term: NSHKR
      meaning: governed AI operations ecosystem and production composition workspace
      canonical_path: /home/home/p/g/n/nshkr
    - term: Synapse
      meaning: AppKit-only product, never a proof host
      canonical_path: /home/home/p/g/n/synapse
    - term: StackLab Synapse staged-live
      meaning: regression harness command, not Synapse product acceptance or production composition
      canonical_path: /home/home/p/g/n/stack_lab
      command: mix stack_lab.synapse.staged_live.v1
    - term: gn-ten
      meaning: ranked-workspace manifest and proof corpus, not program control
      canonical_path: /home/home/p/g/n/stack_lab/gn-ten.yml
    - term: product profile
      meaning: permits AppKit and explicitly allowed pure authoring contracts only
      canonical_path: /home/home/p/g/n/app_kit
    - term: hazmat profile
      meaning: detects direct product access to lower runtime and Execution Plane modules
      canonical_path: /home/home/p/g/n/app_kit
    - term: driving consumer
      meaning: named real journey that justifies the complete owner-service surface
      source: /home/home/p/g/j/jido_brainstorm/nshkrdotcom/docs/20260715/IMPLEMENTATION_CHECKLIST.md
    - term: fixture path
      meaning: deterministic test or proof infrastructure unreachable from normal production selection
      source: /home/home/p/g/j/jido_brainstorm/nshkrdotcom/docs/20260715/IMPLEMENTATION_CHECKLIST.md
    - term: local effect
      meaning: effect executed on the admitted production host without Runtime Client placement
      capability_mode: managed_account_local_effect
    - term: runtime-admitted effect
      meaning: separately advertised effect admitted and placed through Execution Plane Runtime Client
      capability_mode: runtime_admitted_effect
  frozen_choices:
    first_gemini_operation:
      capability_id: model.gemini.managed-account.local-effect
      mode: managed_account_local_effect
      model: gemini-2.5-flash
      provider_api: generateContent
      provider_stream_operation: streamGenerateContent
      transport: local_https_sse
      runtime_client_admission: false
      external_authority_required: true
      external_authority_reason: billable_gemini_provider_call
      official_model_source: https://ai.google.dev/gemini-api/docs/models/gemini-2.5-flash
      official_protocol_source: https://ai.google.dev/gemini-api/docs/generate-content
    first_codex_tool_journey:
      capability_id: codex.session.turn
      mode: managed_account_local_effect
      driving_consumer: synapse-journey-2
      requested_effect: reviewed_write_in_isolated_disposable_workspace
      effect_scope: create_or_replace_one_named_text_file_beneath_the_pinned_workspace_root
      verification: read_the_named_file_and_match_the_reviewed_content
      provider_transport: codex_app_server_json_rpc
      runtime_client_admission: false
      external_authority_required: true
      external_authority_reason: billable_codex_provider_call
    first_infrastructure_provider:
      provider: hetzner
      provider_api: hetzner_cloud_v1
      first_region: fsn1
      driving_consumer: chassis-remote-cluster
      external_authority_required: true
      effect_class: provision_and_decommission_remote_cluster
      cost_or_lifecycle_scope: one_disposable_P09_cluster

call_traces:
  - id: synapse-journey-1.current.v1
    kind: current
    production_reachable: true
    outcome: fixture_backed_acceptance_without_durable_owner_or_model_effect
    request:
      route: /runs/new
      event: start
      required_fields: [title, goal_summary, team_template_ref]
    steps:
      - sequence: 1
        direction: request
        repository: /home/home/p/g/n/synapse
        path: /home/home/p/g/n/synapse/apps/synapse_web/lib/synapse_web/live/run_new_live.ex
        symbol: SynapseWeb.RunNewLive.handle_event/3
        operation: Synapse.AgentRuns.start_run/2
      - sequence: 2
        direction: request
        repository: /home/home/p/g/n/synapse
        path: /home/home/p/g/n/synapse/apps/synapse_core/lib/synapse/agent_runs.ex
        symbol: Synapse.AgentRuns.start_default_run/5
        operation: AppKit.AgentIntake.start_agent_run/3
        selection: Synapse.Fixtures.AgentIntakeBackend
      - sequence: 3
        direction: request
        repository: /home/home/p/g/n/app_kit
        path: /home/home/p/g/n/app_kit/core/app_kit_core/lib/app_kit/headless_surface.ex
        symbol: AppKit.AgentIntake.start_agent_run/3
        operation: validate AgentRunRequest and invoke selected backend
      - sequence: 4
        direction: effect
        repository: /home/home/p/g/n/synapse
        path: /home/home/p/g/n/synapse/apps/synapse_core/lib/synapse/fixtures/agent_intake_backend.ex
        symbol: Synapse.Fixtures.AgentIntakeBackend.start_agent_run/3
        operation: construct deterministic RunOutcomeFuture
        real_effect: false
      - sequence: 5
        direction: return
        repository: /home/home/p/g/n/synapse
        path: /home/home/p/g/n/synapse/apps/synapse_core/lib/synapse/agent_runs.ex
        symbol: Synapse.AgentRuns.start_view/4
        operation: construct accepted fixture-backed product map
      - sequence: 6
        direction: return
        repository: /home/home/p/g/n/synapse
        path: /home/home/p/g/n/synapse/apps/synapse_web/lib/synapse_web/live/run_new_live.ex
        symbol: SynapseWeb.RunNewLive.handle_event/3
        operation: assign fixture-backed result to LiveView socket
    readback:
      list_source: Synapse.AgentRuns.list_runs/1
      list_behavior: static module attribute
      detail_backend: Synapse.Fixtures.HeadlessBackend
      durable_cursor: false
      restart_safe: false
    missing_edges:
      - Mezzanine durable run and first-turn transaction
      - Mezzanine outbox to Temporal workflow handoff
      - OuterBrain context build and publication
      - Citadel persisted provider grant
      - Jido managed account lease and secret materialization
      - Inference to GeminiEx incremental call
      - durable terminal projection and cursor readback

  - id: synapse-journey-1.target.v1
    kind: target
    driving_consumer: synapse-journey-1
    production_reachable: required
    request:
      route: /runs/new
      appkit_operation: AppKit.AgentIntake.start_agent_run/3
      stable_identity: tenant_ref plus installation_ref plus idempotency_key
      selected_model: gemini-2.5-flash
      selected_mode: managed_account_local_effect
    steps:
      - sequence: 1
        direction: request
        owner: synapse
        operation: Synapse.AgentRuns.start_run/2 sends the validated AppKit AgentRunRequest
      - sequence: 2
        direction: request
        owner: app_kit
        operation: AppKit.AgentIntake.start_agent_run/3 maps only product-safe DTOs
      - sequence: 3
        direction: command
        owner: mezzanine
        operation: atomically commit canonical run, first turn, command identity, and outbox row
      - sequence: 4
        direction: coordination
        owner: mezzanine
        operation: relay committed outbox row to the pinned Temporal journey-1 workflow
      - sequence: 5
        direction: context
        owner: outer_brain
        operation: commit context revision and immutable prompt artifact with lineage
      - sequence: 6
        direction: authority
        owner: citadel
        operation: persist the exact model decision and bounded grant
      - sequence: 7
        direction: credential
        owner: jido_integration
        operation: resolve managed Gemini account, issue bounded lease, and materialize secret in memory
      - sequence: 8
        direction: effect
        owner: inference
        operation: invoke the GeminiEx managed adapter incrementally
      - sequence: 9
        direction: provider
        owner: gemini_ex
        operation: Gemini.stream_generate/2 calls gemini-2.5-flash streamGenerateContent over local HTTPS SSE
      - sequence: 10
        direction: return
        owner: jido_integration
        operation: persist attempt lifecycle, sanitized provider events, usage, and terminal artifact reference
      - sequence: 11
        direction: return
        owner: outer_brain
        operation: publish immutable assistant reply and resulting context revision
      - sequence: 12
        direction: return
        owner: mezzanine
        operation: commit terminal turn lineage and advance durable projection cursor
      - sequence: 13
        direction: readback
        owner: app_kit
        operation: AppKit.HeadlessSurface.run_detail/4 and AppKit.AgentIntake.catch_up_agent_events/3 return durable DTOs
      - sequence: 14
        direction: readback
        owner: synapse
        operation: run show replaces provisional deltas with committed turn state and resumes from cursor after restart
    invariants:
      - no product import below AppKit
      - no secret enters durable command, event, projection, trace, or artifact metadata
      - provider success cannot precede durable attempt identity
      - provisional deltas never masquerade as committed turn state
      - restart readback uses owner state, not process memory
      - Execution Plane placement is absent from this local-effect capability

  - id: codex-tool.current-configurable.v1
    kind: current
    production_reachable: false
    outcome: dormant_direct_adapter_path_with_process_identity_and_memory_state
    entry:
      appkit_operation: AppKit.AgentIntake.start_agent_run/3
      required_runtime_binding: codex_cli
    steps:
      - sequence: 1
        direction: request
        repository: /home/home/p/g/n/app_kit
        path: /home/home/p/g/n/app_kit/bridges/mezzanine_bridge/lib/app_kit/bridges/mezzanine_bridge/runtime_adapter.ex
        symbol: AppKit.Bridges.MezzanineBridge.RuntimeAdapter.invoke_runtime_operation/5
        operation: map AgentRunRequest and invoke runtime gateway
      - sequence: 2
        direction: request
        repository: /home/home/p/g/n/app_kit
        path: /home/home/p/g/n/app_kit/bridges/mezzanine_bridge/lib/mezzanine/app_kit_bridge/runtime_gateway_service.ex
        symbol: Mezzanine.AppKitBridge.RuntimeGatewayService.invoke_runtime_operation/6
        operation: forward configured runtime binding
      - sequence: 3
        direction: request
        repository: /home/home/p/g/n/mezzanine
        path: /home/home/p/g/n/mezzanine/bridges/integration_bridge/lib/mezzanine/integration_bridge/runtime_dispatcher.ex
        symbol: Mezzanine.IntegrationBridge.RuntimeDispatcher.invoke_runtime_operation/6
        operation: resolve codex_cli runtime adapter and call run/2
      - sequence: 4
        direction: request
        repository: /home/home/p/g/n/mezzanine
        path: /home/home/p/g/n/mezzanine/bridges/integration_bridge/lib/mezzanine/integration_bridge/provider_adapters/codex_cli/agent_runtime.ex
        symbol: Mezzanine.IntegrationBridge.ProviderAdapters.CodexCli.AgentRuntime.run/2
        operation: prepare workspace and invoke codex.session.turn
      - sequence: 5
        direction: request
        repository: /home/home/p/g/n/jido_integration
        path: /home/home/p/g/n/jido_integration/core/control_plane/lib/jido/integration/v2/control_plane/service_core.ex
        symbol: Jido.Integration.V2.ControlPlane.ServiceCore.invoke/3
        operation: evaluate local policy, issue local lease, and route session capability
      - sequence: 6
        direction: request
        repository: /home/home/p/g/n/jido_integration
        path: /home/home/p/g/n/jido_integration/core/runtime_router/lib/jido/integration/v2/runtime_router.ex
        symbol: Jido.Integration.V2.RuntimeRouter.execute/3
        operation: select ASM driver and keep session in Agent-backed SessionStore
      - sequence: 7
        direction: credential
        repository: /home/home/p/g/n/agent_session_manager
        path: /home/home/p/g/n/agent_session_manager/lib/asm/runtime_auth/codex_materialization.ex
        symbol: ASM.RuntimeAuth.CodexMaterialization.authorize_config/2
        operation: validate exact in-memory Codex materialization
      - sequence: 8
        direction: request
        repository: /home/home/p/g/n/agent_session_manager
        path: /home/home/p/g/n/agent_session_manager/lib/asm/provider_backend/sdk.ex
        symbol: ASM.ProviderBackend.SDK.start_codex_app_server_run/2
        operation: connect Codex app-server and start streamed turn
      - sequence: 9
        direction: request
        repository: /home/home/p/g/n/codex_sdk
        path: /home/home/p/g/n/codex_sdk/lib/codex/app_server.ex
        symbol: Codex.AppServer.connect/2
        operation: supervise JSON-RPC connection
      - sequence: 10
        direction: effect
        repository: /home/home/p/g/n/cli_subprocess_core
        path: /home/home/p/g/n/cli_subprocess_core/lib/cli_subprocess_core/raw_session.ex
        symbol: CliSubprocessCore.RawSession.start/2
        operation: directly start ExecutionPlane.Process.Transport subprocess and execute Codex tool actions
      - sequence: 11
        direction: return
        owner_chain: codex_sdk -> agent_session_manager -> jido_integration -> mezzanine -> app_kit
        operation: normalize events, result, attempt artifacts, and adapter-local readback projection
    defects:
      - not selected by the normal Synapse production release
      - Mezzanine runtime adapter performs the effect before canonical durable effect orchestration
      - Jido runtime sessions are held in an Agent store and include process-backed handles
      - CLI Core directly selects Process.Transport instead of the owned local RuntimeGateway
      - AppKit runtime projection readback is bridge-local process memory

  - id: codex-tool.target.v1
    kind: target
    driving_consumer: synapse-journey-2
    production_reachable: required
    reviewed_request:
      appkit_entry: AppKit.EffectSurface.propose_effect/3
      capability_id: codex.session.turn
      workspace_policy: isolated_disposable_workspace
      requested_effect: create_or_replace_one_named_text_file
      exact_grant_scope: one session generation, one workspace root, one reviewed file operation
    steps:
      - sequence: 1
        direction: request
        owner: app_kit
        operation: accept product-safe governed-effect proposal and readback DTOs only
      - sequence: 2
        direction: command
        owner: mezzanine
        operation: durably commit effect command, expected version, pinned tool manifest, and review unit
      - sequence: 3
        direction: authority
        owner: citadel
        operation: persist permit-with-review decision, obligations, and exact grant
      - sequence: 4
        direction: review
        owner: mezzanine
        operation: commit authorized actor approval before dispatch
      - sequence: 5
        direction: credential
        owner: jido_integration
        operation: resolve managed Codex account, issue one-generation lease, and materialize isolated CODEX_HOME in memory
      - sequence: 6
        direction: session
        owner: agent_session_manager
        operation: start or resume pinned Codex session generation using opaque session and execution refs
      - sequence: 7
        direction: provider
        owner: codex_sdk
        operation: run codex.session.turn over Codex app-server JSON-RPC
      - sequence: 8
        direction: transport
        owner: cli_subprocess_core
        operation: use the complete local RuntimeGateway lifecycle without exposing a process pid
      - sequence: 9
        direction: effect
        owner: cli_subprocess_core
        operation: run the supervised local Process.Transport behind RuntimeGateway.Local with incremental output and real cancel
      - sequence: 10
        direction: return
        owner: cli_subprocess_core
        operation: emit a terminal or ambiguous local receipt bound to the opaque session generation and cancellation or exit evidence
      - sequence: 11
        direction: return
        owner: jido_integration
        operation: persist attempt, sanitized incremental events, receipt ref, lease cleanup, and terminal artifact refs
      - sequence: 12
        direction: return
        owner: mezzanine
        operation: commit effect terminal or ambiguous state exactly once and advance projection cursor
      - sequence: 13
        direction: continuation
        owner: outer_brain
        operation: publish immutable tool result and next context revision
      - sequence: 14
        direction: readback
        owner_chain: app_kit -> synapse
        operation: expose review, incremental output, terminal or ambiguous state, receipt, artifacts, and continuation from durable owner state
    invariants:
      - no ambient credential or shell environment selects the account
      - no provider process starts before persisted decision, review, grant, attempt, and lease identity exist
      - one session generation cannot reuse a revoked or expired materialization
      - cleanup revokes materialized secret files and isolated account state
      - cancellation and provider loss cannot be reported as successful completion
      - local effect and runtime-admitted effect remain separately advertised

owner_map:
  universal_contracts:
    owner: ground_plane
    owns:
      - opaque identity and causality references
      - command-envelope identity and request hashes
      - fences, leases, checkpoints, and persistence posture vocabulary
      - immutable cross-owner artifact metadata
    does_not_own:
      - application tables
      - owner migrations
      - business or execution lifecycle
    contract_sources:
      - /home/home/p/g/n/ground_plane/core/ground_plane_contracts/lib/ground_plane/contracts/opaque_ref.ex
      - /home/home/p/g/n/ground_plane/core/ground_plane_contracts/lib/ground_plane/boundary_protocol/command_envelope.ex
      - /home/home/p/g/n/ground_plane/core/ground_plane_contracts/lib/ground_plane/contracts/artifact_descriptor.ex

  durable_facts:
    - owner: mezzanine
      owns:
        - tenant and installation operational scope
        - run, turn, command, review, operator-control, and business decision truth
        - business event order, outbox and inbox identity, workflow handoff, projection, and cursor
        - operational budgets, deadlines, supersession, retries, and business lineage
      does_not_own:
        - policy evaluation
        - provider credentials or attempts
        - semantic context bodies
        - lower execution or spatial placement truth
      contract_sources:
        - /home/home/p/g/n/mezzanine/core/mezzanine_core/lib/mezzanine/runs/journey_contracts.ex
        - /home/home/p/g/n/mezzanine/core/mezzanine_core/lib/mezzanine/effects/effect_contracts.ex
    - owner: citadel
      owns:
        - policy source and compiled artifact revisions
        - hashed decision input snapshots, authority decisions, and decision hashes
        - scoped grants, obligations, expiry, revocation, and enforcement receipts
        - policy epochs and governance continuity
      does_not_own:
        - Mezzanine review or run state
        - provider accounts or secrets
        - product state
      contract_sources:
        - /home/home/p/g/n/citadel/core/citadel_governance/lib/citadel/scoped_grant.ex
    - owner: outer_brain
      owns:
        - semantic sessions and leases
        - context units and revisions, prompt packs, and tool-manifest snapshots
        - retrieval snapshots, memory provenance, promotion, deletion, and reindex state
        - semantic failures, reply publications, and immutable semantic lineage
      does_not_own:
        - provider attempts
        - operational run state
        - policy authority
      contract_sources:
        - /home/home/p/g/n/outer_brain/core/outer_brain_contracts/lib/outer_brain/contracts/semantic_context_provenance.ex
        - /home/home/p/g/n/outer_brain/core/outer_brain_contracts/lib/outer_brain/contracts/reply_publication.ex
        - /home/home/p/g/n/outer_brain/core/outer_brain_contracts/lib/outer_brain/contracts/memory_context_provenance.ex
    - owner: jido_integration
      owns:
        - connector manifests, installations, connections, and provider account bindings
        - credential handles, generations, leases, rotation, and revocation facts
        - provider attempts, normalized provider events, usage, connector artifacts, and ambiguity
        - credential outbox identity, reaction inbox dedupe, and stale-generation rejection
      does_not_own:
        - raw durable secret values
        - Mezzanine workflow truth
        - Citadel authority
        - Execution Plane placement
      contract_sources:
        - /home/home/p/g/n/jido_integration/core/contracts/lib/jido/integration/v2/credential_lease.ex
        - /home/home/p/g/n/jido_integration/core/contracts/lib/jido/integration/v2/credential_materialization.ex
        - /home/home/p/g/n/jido_integration/core/contracts/lib/jido/integration/v2/attempt.ex
        - /home/home/p/g/n/jido_integration/core/contracts/lib/jido/integration/v2/event.ex
        - /home/home/p/g/n/jido_integration/core/contracts/lib/jido/integration/v2/lease_revocation.ex
    - owner: execution_plane
      owns:
        - admitted targets, lanes, attestations, and placement decisions
        - active lower execution sessions, fences, transport state, and lower event cursors
        - lower cancellation, ambiguity, and terminal receipts
      does_not_own:
        - local-effect execution that has not entered Runtime Client admission
        - credentials or provider-account selection
        - Mezzanine business interpretation
      contract_sources:
        - /home/home/p/g/n/execution_plane/core/execution_plane/lib/execution_plane/boundary.ex
        - /home/home/p/g/n/execution_plane/core/execution_plane/lib/execution_plane/runtime_contracts.ex
    - owner: cli_subprocess_core
      owns:
        - local RuntimeGateway session and execution identity
        - local process output, exit, cancellation, cleanup, ambiguity, and terminal receipt
      does_not_own:
        - provider account or credential facts
        - remote admission or placement
        - Mezzanine business interpretation
      contract_sources:
        - /home/home/p/g/n/cli_subprocess_core/lib/cli_subprocess_core/runtime_gateway.ex
    - owner: agent_session_manager
      owns:
        - governed provider session identity and generation
        - provider-session binding, session lifecycle, fencing, and optimistic revision
        - pinned reaction to credential refresh, revocation, expiry, and rotation
      does_not_own:
        - provider account, credential generation, materialization, or lease facts
        - provider process identity or local process receipt
        - remote admission, placement, or Mezzanine business interpretation
      contract_sources:
        - /home/home/p/g/n/agent_session_manager/lib/asm/managed_session.ex
    - owner: chassis
      owns:
        - clusters, hosts, inventory, capacity, and placement assignments
        - release artifacts, desired and observed deployments, and deployment revisions
        - rollout, rollback, drain, replacement, reconciliation, leases, fences, and checkpoints
        - host and infrastructure materialization receipts
      does_not_own:
        - Mezzanine deployment-request workflow or priority
        - Jido provider usage
        - Citadel authority
      contract_sources:
        - /home/home/p/g/n/chassis/core/chassis_contracts/lib/chassis/release_resource_contracts.ex
    - owner: nshkr_runtime
      owns:
        - immutable production substrate and composition profile
        - executable capability activation and absence truth
        - exact separation of local-effect and runtime-admitted modes
      does_not_own:
        - any domain owner's private records or migrations
        - provider protocol or lower execution state
      contract_sources:
        - /home/home/p/g/n/nshkr/apps/nshkr_runtime/lib/nshkr/runtime/contracts.ex
    - owner: aitrace
      owns:
        - trace, span, and trace-event encoding
        - trace redaction and bounds
        - retained trace export artifacts
      does_not_own:
        - audit, policy, billing, operational metrics, or business truth
      contract_sources:
        - /home/home/p/g/n/AITrace/lib/aitrace/trace.ex
        - /home/home/p/g/n/AITrace/lib/aitrace/span.ex
        - /home/home/p/g/n/AITrace/lib/aitrace/event.ex
        - /home/home/p/g/n/AITrace/lib/aitrace/export_bounds.ex
        - /home/home/p/g/n/AITrace/lib/aitrace/governed_effect_evidence.ex
        - /home/home/p/g/n/AITrace/lib/aitrace/exporter.ex
    - owner: app_kit
      owns:
        - typed product-safe request, result, event, cursor, review, effect, and capability DTOs
      durable_database_truth: none
      contract_sources:
        - /home/home/p/g/n/app_kit/core/app_kit_core/lib/app_kit/core/agent_intake/dtos.ex
        - /home/home/p/g/n/app_kit/core/app_kit_core/lib/app_kit/core/governed_effect_dtos.ex
    - owner: products
      members: [synapse, extravaganza]
      owns:
        - presentation and product configuration
        - product workflows expressed only through AppKit
      durable_lower_stack_truth: none
    - owner: provider_sdks_and_inference
      members: [gemini_ex, codex_sdk, inference]
      owns:
        - provider protocol execution and semantic response normalization
      durable_managed_truth: none

  secrets:
    durable_value_owner:
      owner: hashicorp_vault_kv_v2
      mount_ref: vault-mount://nshkr/kv-v2
      values:
        - provider credentials
        - Codex account material
        - Chassis enrollment and infrastructure secrets
        - BEAM distribution bootstrap material
    control_fact_owner:
      owner: jido_integration
      owns:
        - secret-envelope and credential-handle refs
        - provider-account generation and fence
        - exact-effect credential lease and materialization authorization
    transient_material_owner:
      owner: provider_family_materializer
      lifecycle: in_memory_or_isolated_ephemeral_root_only
      durable_encoding: forbidden
      cleanup_owner: jido_integration
    session_reaction_owner:
      owner: agent_session_manager
      owns:
        - pinned session generation reaction to refresh, reconnect, regenerate, drain, cancel, or operator action
      credential_fact_authority: false

  effects:
    - id: gemini-managed-account-local-effect
      mode: managed_account_local_effect
      authority_owner: citadel
      attempt_owner: jido_integration
      protocol_owners: [inference, gemini_ex]
      placement_owner: none
      business_owner: mezzanine
    - id: codex-reviewed-local-effect
      mode: managed_account_local_effect
      authority_owner: citadel
      review_and_business_owner: mezzanine
      account_and_attempt_owner: jido_integration
      session_owner: agent_session_manager
      protocol_owner: codex_sdk
      local_process_and_receipt_owner: cli_subprocess_core
      placement_owner: none
    - id: admitted-process-http-websocket-effects
      mode: runtime_admitted_effect
      authority_owner: citadel
      account_and_attempt_owner: jido_integration
      admission_placement_execution_and_receipt_owner: execution_plane
      business_owner: mezzanine
    - id: chassis-host-and-infrastructure-effects
      authority_owner: citadel
      workflow_owner: mezzanine
      placement_reconciliation_and_receipt_owner: chassis
    - id: extravaganza-issue-repository-publication-effects
      product_owner: extravaganza
      workflow_owner: mezzanine
      connector_account_attempt_and_external_receipt_owner: jido_integration
      lower_execution_owner: execution_plane

  lifecycle:
    operational_and_business: mezzanine
    policy_authority_and_revocation: citadel
    semantic_context_memory_and_publication: outer_brain
    connector_account_credential_and_provider_attempt: jido_integration
    admitted_lower_execution: execution_plane
    spatial_deployment_and_host: chassis
    provider_process_session_generation: agent_session_manager
    local_cli_process: cli_subprocess_core

  receipts:
    command_review_control_and_business_terminal: mezzanine
    decision_grant_revocation_and_enforcement: citadel
    semantic_context_and_reply_publication: outer_brain
    connector_provider_attempt_usage_and_external_effect: jido_integration
    runtime_admission_lower_execution_and_cancellation: execution_plane
    local_cli_exit_cancellation_and_cleanup: cli_subprocess_core
    deployment_host_and_infrastructure_materialization: chassis
    trace_export_only: aitrace

