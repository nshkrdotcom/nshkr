name: nshkr-runtime-dev

services:
  vault:
    image: hashicorp/vault@sha256:a296a888b118615dc01d5f1a6846e6d4a7277946caaed5b447008fff5fe06b54
    command: server -dev -dev-listen-address=0.0.0.0:8200
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${NSHKR_DEV_VAULT_ROOT_TOKEN:?required}
    ports:
      - "127.0.0.1:18200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 2s
      timeout: 2s
      retries: 30
    tmpfs:
      - /vault/file

  minio:
    image: quay.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${NSHKR_DEV_MINIO_ACCESS_KEY:?required}
      MINIO_ROOT_PASSWORD: ${NSHKR_DEV_MINIO_SECRET_KEY:?required}
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"
    volumes:
      - minio-data:/data

  minio-bootstrap:
    image: quay.io/minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      - minio
    environment:
      MINIO_ACCESS_KEY: ${NSHKR_DEV_MINIO_ACCESS_KEY:?required}
      MINIO_SECRET_KEY: ${NSHKR_DEV_MINIO_SECRET_KEY:?required}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ACCESS_KEY}" "$${MINIO_SECRET_KEY}" >/dev/null 2>&1; do sleep 1; done
        mc mb --ignore-existing local/artifacts >/dev/null

  vault-bootstrap:
    image: hashicorp/vault@sha256:a296a888b118615dc01d5f1a6846e6d4a7277946caaed5b447008fff5fe06b54
    user: "${NSHKR_DEV_UID:?required}:${NSHKR_DEV_GID:?required}"
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${NSHKR_DEV_VAULT_ROOT_TOKEN:?required}
      MINIO_ACCESS_KEY: ${NSHKR_DEV_MINIO_ACCESS_KEY:?required}
      MINIO_SECRET_KEY: ${NSHKR_DEV_MINIO_SECRET_KEY:?required}
    volumes:
      - ${NSHKR_DEV_RUNTIME_DIR:?required}:/out
      - ./bootstrap-vault.sh:/bootstrap-vault.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap-vault.sh"]

volumes:
  minio-data:
